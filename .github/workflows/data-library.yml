name: data-library

# Scheduled refresh + deploy of the private Ventis Data Library.
# Pulls the live Sheet (read-only key) -> existing pipeline -> build_catalog.py
# -> static React app -> Cloudflare Pages (gated by Cloudflare Access).
#
# Moat: the service-account key + private data exist ONLY inside this ephemeral
# runner and on the gated Cloudflare edge. Nothing private is committed.
# 🔴 Do NOT enable the schedule until Cloudflare Access is proven to block anon
#    (see docs/plans Task 10). Until then, run only via manual workflow_dispatch.

on:
  schedule: [{ cron: "17 * * * *" }]   # hourly — Access gate verified 2026-06-05 (anon 302 on apex + hash aliases)
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r site/scripts/requirements.txt

      - name: Write service-account key (read-only Sheets)
        env:
          VENTIS_SA_JSON: ${{ secrets.VENTIS_SA_JSON }}
        run: printf '%s' "$VENTIS_SA_JSON" > site/scripts/service_account.json

      - name: Refresh dataset + charts (pull -> sqlite -> archive -> plot)
        env:
          VENTIS_SHEET_ID: ${{ secrets.VENTIS_SHEET_ID }}
        run: python site/scripts/refresh_backup.py --no-backup

      - name: Sync system-of-record to Supabase (durable, off-laptop)
        # Runs BEFORE build_catalog so the catalog is built from the freshly-synced SoR.
        # No-op (dry run, exit 0) if SUPABASE_DB_URL is unset — keeps CI green.
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          VENTIS_SHEET_ID: ${{ secrets.VENTIS_SHEET_ID }}
        run: python site/scripts/supabase_sync.py

      - name: Reconcile web consent submissions to runs
        # After sync (runs exist), before build_catalog (so catalog reflects new consent).
        # No-op if SUPABASE_DB_URL unset.
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python site/scripts/reconcile_consent.py

      - name: Reconcile end-of-run captures to runs
        # Folds Run Launcher end-of-run captures (run_launches) into annotations by
        # run_key, so the catalog auto-categorizes the run. No-op if SUPABASE_DB_URL unset.
        # DISCORD_WEBHOOK_URL (optional) pings once per newly-documented run; silent no-op
        # if the secret is unset.
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python site/scripts/reconcile_run_ends.py

      - name: Build catalog (catalog.json + series + charts)
        # Reads runs/readings from Supabase when SUPABASE_DB_URL is set, else local SQLite.
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python site/scripts/build_catalog.py

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build the catalog app
        run: |
          cd library
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages (production only)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # Run from library/ so wrangler picks up functions/ (the /api/annotate
          # Pages Function) and wrangler.toml (nodejs_compat + pages_build_output_dir).
          # --branch=main forces a PRODUCTION deploy. Preview deploys get unique
          # *.pages.dev subdomains that a single-hostname Access policy may NOT
          # cover -> moat leak. Keep deploys production-only.
          workingDirectory: library
          command: pages deploy --project-name=ventis-data-library --branch=main

      - name: Clean up key
        if: always()
        run: rm -f site/scripts/service_account.json
